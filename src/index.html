<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Sound Player</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Кастомный топ-бар -->
    <div class="title-bar">
        <div class="logo-text">AmbientSP</div>
        <div class="window-controls">
            <button class="control-btn" id="btnMinimize" title="Minimize">&#9644;</button>
            <button class="control-btn" id="btnTray" title="Hide to Tray">&#128455;</button>
            <button class="control-btn close-btn" id="btnClose" title="Close">&#10006;</button>
        </div>
    </div>

    <!-- Контейнер приложения -->
    <div class="app-container">
        <div class="sounds-grid" id="soundsGrid"></div>
    </div>

    <script src="js/app.js" defer></script>
</body>
</html>
